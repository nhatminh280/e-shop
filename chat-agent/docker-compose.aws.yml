# Production stack for hosting the chat-agent + its Qdrant collection on a
# single EC2 instance. The Spring Boot backend is NOT included here — the
# chat-agent reaches it through BACKEND_BASE_URL (override per environment).
#
# Usage on EC2:
#   cd ~/e-shop/chat-agent
#   docker compose -f docker-compose.aws.yml up -d
#
# Env vars expected on the EC2 (put them in ~/.env or systemd unit):
#   OPENAI_API_KEY=sk-...
#   LLM_MODEL=gpt-4o-mini
#   BACKEND_BASE_URL=https://your-backend-host:8080   (or http for now)
#   RECOMMENDER_BASE_URL=http://18.143.45.118:8000

services:
  qdrant:
    image: qdrant/qdrant:v1.10.1
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --save 60 1
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru

  chat-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: e-shop-chat-agent:cpu
    restart: unless-stopped
    depends_on:
      - qdrant
      - redis
    environment:
      MOCK_BACKEND: "false"
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://host.docker.internal:8080}
      BACKEND_TIMEOUT_SECONDS: ${BACKEND_TIMEOUT_SECONDS:-3}
      BACKEND_RETRIES: ${BACKEND_RETRIES:-1}
      BACKEND_CIRCUIT_FAILURE_THRESHOLD: 3
      BACKEND_CIRCUIT_COOLDOWN_SECONDS: 10
      RECOMMENDER_BASE_URL: ${RECOMMENDER_BASE_URL:-http://18.143.45.118:8000}
      RECOMMENDER_TIMEOUT_SECONDS: 5
      KNOWLEDGE_RETRIEVAL_MODE: ${KNOWLEDGE_RETRIEVAL_MODE:-qdrant}
      KNOWLEDGE_QDRANT_COLLECTION: ${KNOWLEDGE_QDRANT_COLLECTION:-knowledge_documents_v1}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_API_URL: ${LLM_API_URL:-https://api.openai.com/v1/chat/completions}
      LLM_API_KEY: ${LLM_API_KEY:-${OPENAI_API_KEY}}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: 8
      CHAT_AGENT_JSON_LOGS: "true"
      CHAT_AGENT_LOG_LEVEL: INFO
      MIN_VECTOR_SCORE: ${MIN_VECTOR_SCORE:-0.4}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-e-shop-chat-agent}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8010:8010"

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    depends_on:
      - chat-agent
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

volumes:
  qdrant_storage:
  redis_data:
  prometheus_data:
  grafana_data:
