<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Shop Scheduler Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fetch-api-polyfill/3.1.0/fetch.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #333;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      .header {
        background: white;
        padding: 30px;
        border-radius: 10px;
        margin-bottom: 30px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .header h1 {
        color: #667eea;
        margin-bottom: 10px;
        font-size: 28px;
      }

      .header p {
        color: #666;
        font-size: 14px;
      }

      .refresh-btn {
        background: #667eea;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.3s;
      }

      .refresh-btn:hover {
        background: #764ba2;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .card-title {
        font-size: 14px;
        color: #666;
        font-weight: 600;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .card-value {
        font-size: 32px;
        font-weight: bold;
        color: #667eea;
        margin-bottom: 5px;
      }

      .card-subtitle {
        font-size: 12px;
        color: #999;
      }

      .status-running {
        color: #27ae60;
        font-weight: bold;
      }

      .status-stopped {
        color: #e74c3c;
        font-weight: bold;
      }

      .status-success {
        background: #d4edda;
        color: #155724;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
      }

      .status-failed {
        background: #f8d7da;
        color: #721c24;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
      }

      .table-section {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
      }

      .table-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 15px;
        color: #333;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #f5f5f5;
        padding: 12px;
        text-align: left;
        font-weight: 600;
        font-size: 13px;
        color: #666;
        border-bottom: 2px solid #ddd;
      }

      td {
        padding: 12px;
        border-bottom: 1px solid #eee;
        font-size: 13px;
      }

      tr:hover {
        background: #f9f9f9;
      }

      .task-badge {
        display: inline-block;
        background: #667eea;
        color: white;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
      }

      .logs-container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .logs-content {
        background: #f5f5f5;
        padding: 15px;
        border-radius: 5px;
        max-height: 400px;
        overflow-y: auto;
        font-family: "Courier New", monospace;
        font-size: 12px;
        line-height: 1.4;
      }

      .log-entry {
        margin-bottom: 5px;
        padding: 5px;
      }

      .log-info {
        color: #3498db;
      }

      .log-success {
        color: #27ae60;
      }

      .log-warning {
        color: #f39c12;
      }

      .log-error {
        color: #e74c3c;
      }

      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid #f3f3f3;
        border-top: 2px solid #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: #999;
      }

      .error {
        background: #f8d7da;
        color: #721c24;
        padding: 15px;
        border-radius: 5px;
        margin: 20px 0;
      }

      @media (max-width: 768px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <div>
            <h1>🕐 Scheduler Dashboard</h1>
            <p>E-Shop Recommendation Pipeline Monitor</p>
          </div>
          <button class="refresh-btn" onclick="refreshDashboard()">
            🔄 Refresh Now
          </button>
        </div>
      </div>

      <!-- KPI Cards -->
      <div class="grid" id="kpiCards">
        <div class="card">
          <div class="card-title">Scheduler Status</div>
          <div id="schedulerStatus" class="card-value status-running">●</div>
          <div class="card-subtitle">Loading...</div>
        </div>
        <div class="card">
          <div class="card-title">Runs Today</div>
          <div id="runsTodayCount" class="card-value">-</div>
          <div class="card-subtitle">Total executions</div>
        </div>
        <div class="card">
          <div class="card-title">Success Rate</div>
          <div id="successRate" class="card-value">-</div>
          <div class="card-subtitle">Today's successful runs</div>
        </div>
        <div class="card">
          <div class="card-title">Avg Duration</div>
          <div id="avgDuration" class="card-value">-</div>
          <div class="card-subtitle">Average execution time</div>
        </div>
      </div>

      <!-- Run History Table -->
      <div class="table-section">
        <div class="table-title">📊 Recent Run History</div>
        <div id="historyTable">
          <div class="loading">
            <div class="spinner"></div>
            Loading...
          </div>
        </div>
      </div>

      <!-- Latest Logs -->
      <div class="logs-container">
        <div class="table-title">📝 Latest Scheduler Logs</div>
        <div class="logs-content" id="logsContainer">
          <div class="loading">
            <div class="spinner"></div>
            Loading logs...
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = "http://localhost:8000";
      let autoRefresh = null;

      async function refreshDashboard() {
        try {
          await Promise.all([loadSummary(), loadHistory(), loadLogs()]);
        } catch (error) {
          console.error("Error refreshing dashboard:", error);
          showError("Failed to refresh dashboard");
        }
      }

      async function loadSummary() {
        try {
          const response = await fetch(`${API_BASE}/scheduler/summary`);
          const result = await response.json();

          if (result.data) {
            const data = result.data;

            // Scheduler Status
            const statusEl = document.getElementById("schedulerStatus");
            if (data.scheduler_running) {
              statusEl.textContent = "🟢 RUNNING";
              statusEl.className = "card-value status-running";
            } else {
              statusEl.textContent = "🔴 STOPPED";
              statusEl.className = "card-value status-stopped";
            }

            // Runs Today
            document.getElementById(
              "runsTodayCount"
            ).textContent = `${data.successful_runs}/${data.total_runs_today}`;

            // Success Rate
            const successRate =
              data.total_runs_today > 0
                ? (
                    (data.successful_runs / data.total_runs_today) *
                    100
                  ).toFixed(0)
                : 0;
            document.getElementById(
              "successRate"
            ).textContent = `${successRate}%`;

            // Avg Duration
            document.getElementById(
              "avgDuration"
            ).textContent = `${data.average_duration_seconds.toFixed(1)}s`;
          }
        } catch (error) {
          console.error("Error loading summary:", error);
        }
      }

      async function loadHistory() {
        try {
          const response = await fetch(
            `${API_BASE}/scheduler/history?page=1&page_size=10`
          );
          const result = await response.json();

          if (result.data && result.data.items) {
            const items = result.data.items;

            let html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Task</th>
                                    <th>Status</th>
                                    <th>Start Time</th>
                                    <th>Duration</th>
                                    <th>Error</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

            items.forEach((item) => {
              const statusClass =
                item.status === "success" ? "status-success" : "status-failed";
              const statusText = item.status.toUpperCase();
              const startTime = new Date(item.start_time).toLocaleString();
              const duration = item.duration_seconds.toFixed(2);
              const error = item.error ? item.error.substring(0, 50) : "-";

              html += `
                            <tr>
                                <td><span class="task-badge">${item.task}</span></td>
                                <td><span class="${statusClass}">${statusText}</span></td>
                                <td>${startTime}</td>
                                <td>${duration}s</td>
                                <td>${error}</td>
                            </tr>
                        `;
            });

            html += `
                            </tbody>
                        </table>
                    `;

            document.getElementById("historyTable").innerHTML = html;
          }
        } catch (error) {
          console.error("Error loading history:", error);
          document.getElementById("historyTable").innerHTML =
            '<div class="error">Failed to load history</div>';
        }
      }

      async function loadLogs() {
        try {
          const response = await fetch(`${API_BASE}/scheduler/logs?lines=50`);
          const result = await response.json();

          if (result.data && result.data.entries) {
            const entries = result.data.entries;

            let html = "";
            entries.forEach((entry) => {
              const levelClass = `log-${entry.level.toLowerCase()}`;
              const timestamp = new Date(entry.timestamp).toLocaleTimeString();
              const message = entry.message
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");

              html += `<div class="log-entry ${levelClass}">[${timestamp}] ${entry.level}: ${message}</div>`;
            });

            document.getElementById("logsContainer").innerHTML = html;
          }
        } catch (error) {
          console.error("Error loading logs:", error);
          document.getElementById("logsContainer").innerHTML =
            '<div class="error">Failed to load logs</div>';
        }
      }

      function showError(message) {
        const container = document.querySelector(".container");
        const errorDiv = document.createElement("div");
        errorDiv.className = "error";
        errorDiv.textContent = message;
        container.insertBefore(errorDiv, container.firstChild);

        setTimeout(() => errorDiv.remove(), 5000);
      }

      // Auto-refresh every 30 seconds
      function startAutoRefresh() {
        refreshDashboard();
        autoRefresh = setInterval(refreshDashboard, 30000);
      }

      // Stop auto-refresh
      function stopAutoRefresh() {
        if (autoRefresh) {
          clearInterval(autoRefresh);
        }
      }

      // Visibility API to pause refresh when tab is not visible
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          stopAutoRefresh();
        } else {
          startAutoRefresh();
        }
      });

      // Start on load
      window.addEventListener("load", startAutoRefresh);
    </script>
  </body>
</html>
