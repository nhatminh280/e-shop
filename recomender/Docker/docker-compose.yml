services:
  # PostgreSQL
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: eshop
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "${RECOM_POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eshop-network
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "${RECOM_REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eshop-network
    restart: unless-stopped

  # Qdrant vector database
  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "${RECOM_QDRANT_HTTP_PORT:-6333}:6333"
      - "${RECOM_QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - eshop-network
    restart: unless-stopped

  # SCHEDULER SERVICE
  scheduler:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    command: python scheduler.py --daemon
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=eshop
      - DB_USER=app
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SCHEDULER_CONFIG=/app/scheduler_config.json
    volumes:
      - ../etl/data:/app/data
      - ../etl/logs:/app/logs
      - ../etl/scheduler.py:/app/scheduler.py
      - ../etl/config.py:/app/config.py
      - ../etl/Content_Base_Model/scheduler_api.py:/app/scheduler_api.py
      - ./scheduler_config.json:/app/scheduler_config.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eshop-network
    restart: unless-stopped
    profiles:
      - scheduler

  # ETL
  etl:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    entrypoint: ["/app/entrypoint.sh"]
    command: ["etl", "--lookback-days", "90"]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=eshop
      - DB_USER=app
      - DB_PASSWORD=secret
    volumes:
      - ../etl/data:/app/data
      - ../etl/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eshop-network
    profiles:
      - etl

  # CLIP Embeddings
  clip-embeddings:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    entrypoint: ["/app/entrypoint.sh"]
    command: ["clip"]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=eshop
      - DB_USER=app
      - DB_PASSWORD=secret
    volumes:
      - ../etl/data:/app/data
      - ../etl/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eshop-network
    profiles:
      - clip

  # Workflow
  workflow:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    entrypoint: ["/app/entrypoint.sh"]
    command: ["workflow"]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=eshop
      - DB_USER=app
      - DB_PASSWORD=secret
    volumes:
      - ../etl/data:/app/data
      - ../etl/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eshop-network
    profiles:
      - workflow

  # Build Qdrant collection
  build-qdrant:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    entrypoint: ["/app/entrypoint.sh"]
    command: ["build-qdrant"]
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=product_variants_v1
    volumes:
      - ../etl/data:/app/data
      - ../etl/logs:/app/logs
      - ../etl/Content_Base_Model:/app/Content_Base_Model
    depends_on:
      qdrant:
        condition: service_started
    networks:
      - eshop-network
    profiles:
      - build-index

  # Legacy FAISS builder kept for benchmark/rollback comparisons
  build-faiss:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    entrypoint: ["/app/entrypoint.sh"]
    command: ["build-faiss"]
    volumes:
      - ../etl/data:/app/data
      - ../etl/logs:/app/logs
    networks:
      - eshop-network
    profiles:
      - legacy-faiss

  # Recommendation API
  api:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    command: uvicorn Content_Base_Model.recommendation_api:eshop --host 0.0.0.0 --port 8000
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=product_variants_v1
      - DB_HOST=postgres
      - DB_PORT=5432
    ports:
      - "${RECOM_API_PORT:-8000}:8000"
    volumes:
      - ../etl/data:/app/data
      - ../etl/logs:/app/logs
      - ../etl/Content_Base_Model:/app/Content_Base_Model
      - ../etl/config.py:/app/config.py
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - eshop-network
    restart: unless-stopped

  # Gradio Tester
  gradio-tester:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    command: python testAPI.py
    environment:
      - API_URL=http://api:8000
    ports:
      - "${RECOM_GRADIO_PORT:-7860}:7860"
    volumes:
      - ../etl/data:/app/data
      - ../etl/Content_Base_Model/testAPI.py:/app/testAPI.py
    depends_on:
      - api
    networks:
      - eshop-network
    profiles:
      - testing

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  eshop-network:
    driver: bridge
