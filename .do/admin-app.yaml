# DigitalOcean App Platform spec for the admin dashboard.
# This app assumes the public API lives at https://eshop.example.com.

name: eshop-admin
region: nyc
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
static_sites:
  - name: admin
    github:
      repo: your-github-user/e-shop
      branch: main
      deploy_on_push: true
    source_dir: admin
    environment_slug: node-js
    build_command: npm ci && npm run build
    output_dir: dist
    catchall_document: index.html
    envs:
      - key: VITE_API_BASE_URL
        value: https://eshop.example.com
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: VITE_SOCKET_URL
        value: https://eshop.example.com/ws
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
