# DigitalOcean App Platform spec for the public storefront plus the Spring API.
# Replace the placeholder repo, branch, domains, and secret values before deploying.

name: eshop-storefront
region: nyc
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
ingress:
  rules:
    - component:
        name: api
        preserve_path_prefix: true
      match:
        path:
          prefix: /api
    - component:
        name: api
        preserve_path_prefix: true
      match:
        path:
          prefix: /ws
    - component:
        name: api
        preserve_path_prefix: true
      match:
        path:
          prefix: /swagger-ui
    - component:
        name: api
        preserve_path_prefix: true
      match:
        path:
          prefix: /v3/api-docs
    - component:
        name: storefront
      match:
        path:
          prefix: /
services:
  - name: api
    github:
      repo: your-github-user/e-shop
      branch: main
      deploy_on_push: true
    source_dir: backend/e-shop
    dockerfile_path: backend/e-shop/Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      failure_threshold: 5
      http_path: /actuator/health
    envs:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://db-postgresql-nyc3-12345-do-user-1234567-0.g.db.ondigitalocean.com:25060/eshop?sslmode=require
        scope: RUN_TIME
        type: GENERAL
      - key: SPRING_DATASOURCE_USERNAME
        value: doadmin
        scope: RUN_TIME
        type: SECRET
      - key: SPRING_DATASOURCE_PASSWORD
        value: replace-me
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        value: replace-me-with-a-long-random-secret
        scope: RUN_TIME
        type: SECRET
      - key: APP_CORS_ALLOWED_ORIGIN_PATTERNS
        value: https://eshop.example.com,https://admin.eshop.example.com
        scope: RUN_TIME
        type: GENERAL
      - key: APP_ACTIVATION_BASE_URL
        value: https://eshop.example.com/auth/activate
        scope: RUN_TIME
        type: GENERAL
      - key: APP_MAIL_FROM
        value: E-Shop <no-reply@eshop.example.com>
        scope: RUN_TIME
        type: GENERAL
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com
        scope: RUN_TIME
        type: GENERAL
      - key: SPRING_MAIL_PORT
        value: "587"
        scope: RUN_TIME
        type: GENERAL
      - key: SPRING_MAIL_USERNAME
        value: no-reply@eshop.example.com
        scope: RUN_TIME
        type: SECRET
      - key: SPRING_MAIL_PASSWORD
        value: replace-me
        scope: RUN_TIME
        type: SECRET
      - key: STORAGE_MINIO_ENDPOINT
        value: https://nyc3.digitaloceanspaces.com
        scope: RUN_TIME
        type: GENERAL
      - key: STORAGE_MINIO_ACCESS_KEY
        value: replace-me
        scope: RUN_TIME
        type: SECRET
      - key: STORAGE_MINIO_SECRET_KEY
        value: replace-me
        scope: RUN_TIME
        type: SECRET
      - key: STORAGE_MINIO_BUCKET
        value: eshop-products
        scope: RUN_TIME
        type: GENERAL
      - key: STORAGE_MINIO_REGION
        value: nyc3
        scope: RUN_TIME
        type: GENERAL
      - key: STORAGE_MINIO_PUBLIC_URL
        value: https://eshop-products.nyc3.digitaloceanspaces.com
        scope: RUN_TIME
        type: GENERAL
      - key: VNPAY_RETURN_URL
        value: https://eshop.example.com/payment-result
        scope: RUN_TIME
        type: GENERAL
      - key: RECOMMENDATION_ENABLED
        value: "false"
        scope: RUN_TIME
        type: GENERAL
      # Optional when you deploy the Python recommender separately.
      # - key: RECOMMENDER_BASE_URL
      #   value: https://recommender.example.com
      #   scope: RUN_TIME
      #   type: GENERAL
static_sites:
  - name: storefront
    github:
      repo: your-github-user/e-shop
      branch: main
      deploy_on_push: true
    source_dir: client
    environment_slug: node-js
    build_command: npm ci && npm run build
    output_dir: dist
    catchall_document: index.html
