# DigitalOcean App Platform spec for the Spring Boot API only.
# Use this when the storefront/admin are hosted elsewhere (for example Cloudflare Pages).
# Replace the placeholder repo, branch, domains, and secret values before deploying.
name: eshop-api
region: sgp1
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
services:
  - name: api
    github:
      repo: finnzxje/e-shop
      branch: deploy
      deploy_on_push: true
    source_dir: backend/e-shop
    dockerfile_path: backend/e-shop/Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      failure_threshold: 5
      http_path: /actuator/health
    envs:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://db-postgresql-sgp1-12345-do-user-1234567-0.g.db.ondigitalocean.com:25060/eshop?sslmode=require
        scope: RUN_TIME
        type: GENERAL
      - key: SPRING_DATASOURCE_USERNAME
        value: doadmin
        scope: RUN_TIME
        type: SECRET
      - key: SPRING_DATASOURCE_PASSWORD
        value: replace-me
        scope: RUN_TIME
        type: SECRET
      - key: SPRING_DATA_REDIS_HOST
        value: redis-cache.example.internal
        scope: RUN_TIME
        type: GENERAL
      - key: SPRING_DATA_REDIS_PORT
        value: "6379"
        scope: RUN_TIME
        type: GENERAL
      - key: SPRING_DATA_REDIS_PASSWORD
        value: replace-me-with-redis-password
        scope: RUN_TIME
        type: SECRET
      - key: SPRING_DATA_REDIS_SSL_ENABLED
        value: "false"
        scope: RUN_TIME
        type: GENERAL
      - key: APP_CACHE_NAMESPACE
        value: eshop::prod
        scope: RUN_TIME
        type: GENERAL
      - key: APP_CACHE_DEFAULT_TTL
        value: 15m
        scope: RUN_TIME
        type: GENERAL
      - key: JWT_SECRET
        value: replace-me-with-a-long-random-secret
        scope: RUN_TIME
        type: SECRET
      - key: APP_CORS_ALLOWED_ORIGIN_PATTERNS
        value: https://shop.example.com,https://www.shop.example.com,https://admin.shop.example.com
        scope: RUN_TIME
        type: GENERAL
      - key: APP_ACTIVATION_BASE_URL
        value: https://shop.example.com/auth/activate
        scope: RUN_TIME
        type: GENERAL
      - key: APP_MAIL_FROM
        value: E-Shop <no-reply@shop.example.com>
        scope: RUN_TIME
        type: GENERAL
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com
        scope: RUN_TIME
        type: GENERAL
      - key: SPRING_MAIL_PORT
        value: "587"
        scope: RUN_TIME
        type: GENERAL
      - key: SPRING_MAIL_USERNAME
        value: no-reply@shop.example.com
        scope: RUN_TIME
        type: SECRET
      - key: SPRING_MAIL_PASSWORD
        value: replace-me
        scope: RUN_TIME
        type: SECRET
      - key: STORAGE_MINIO_ENDPOINT
        value: https://sgp1.digitaloceanspaces.com
        scope: RUN_TIME
        type: GENERAL
      - key: STORAGE_MINIO_ACCESS_KEY
        value: replace-me
        scope: RUN_TIME
        type: SECRET
      - key: STORAGE_MINIO_SECRET_KEY
        value: replace-me
        scope: RUN_TIME
        type: SECRET
      - key: STORAGE_MINIO_BUCKET
        value: eshop-products
        scope: RUN_TIME
        type: GENERAL
      - key: STORAGE_MINIO_REGION
        value: sgp1
        scope: RUN_TIME
        type: GENERAL
      - key: STORAGE_MINIO_PUBLIC_URL
        value: https://sgp1.digitaloceanspaces.com
        scope: RUN_TIME
        type: GENERAL
      - key: VNPAY_RETURN_URL
        value: https://shop.example.com/payment-result
        scope: RUN_TIME
        type: GENERAL
      - key: RECOMMENDATION_ENABLED
        value: "false"
        scope: RUN_TIME
        type: GENERAL
    # Optional when you deploy the Python recommender separately.
    # - key: RECOMMENDER_BASE_URL
    #   value: https://recommender.example.com
    #   scope: RUN_TIME
    #   type: GENERAL
