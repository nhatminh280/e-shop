services:
  postgres_test:
    image: postgres:17
    environment:
      POSTGRES_DB: eshop_test
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "${POSTGRES_TEST_PORT:-5434}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_test_data:
